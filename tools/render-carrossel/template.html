<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Outfit:wght@200;300;400;500&display=block" rel="stylesheet">
<style>
  :root {
    --barro: #8C4A36; --barro2: #9A5A43; --terracota: #C87A5B;
    --areia: #F3E4D6; --creme: #FBF4EC;
    --salvia: #7D8A6A; --carvao: #2E241D;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Outfit', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; }
  .slide { width: 1080px; height: 1350px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; text-align: center; }

  .slide.capa { background: var(--barro); color: var(--creme); }
  .slide.capa .title { font-family: var(--serif); font-weight: 300; font-size: 64px; line-height: 1.25; margin-bottom: 24px; }
  .slide.capa .accent { font-family: var(--serif); font-style: italic; font-size: 36px; color: var(--terracota); }

  .slide.conteudo { background: var(--creme); color: var(--carvao); }
  .slide.conteudo .num { font-family: var(--serif); font-style: italic; font-size: 120px; color: var(--areia); opacity: 0.6; position: absolute; top: 60px; left: 80px; }
  .slide.conteudo .body { font-family: var(--sans); font-weight: 300; font-size: 42px; line-height: 1.55; max-width: 860px; position: relative; z-index: 1; }

  .slide.citacao { background: var(--areia); color: var(--barro); }
  .slide.citacao .body { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 48px; line-height: 1.4; max-width: 820px; }

  .slide.cta { background: var(--salvia); color: var(--creme); }
  .slide.cta .body { font-family: var(--sans); font-weight: 400; font-size: 44px; line-height: 1.45; max-width: 800px; margin-bottom: 40px; }
  .slide.cta .btn { display: inline-block; background: var(--creme); color: var(--salvia); padding: 24px 60px; border-radius: 50px; font-family: var(--sans); font-size: 32px; font-weight: 400; }

  .slide.assinatura { background: var(--carvao); color: var(--creme); }
  .slide.assinatura .spiral { width: 80px; height: 80px; margin-bottom: 30px; }
  .slide.assinatura .name { font-family: var(--serif); font-style: italic; font-size: 36px; color: var(--terracota); }
  .slide.assinatura .handle { font-family: var(--sans); font-weight: 300; font-size: 28px; color: var(--creme); opacity: 0.5; margin-top: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script>
  const data = window.SLIDE_DATA;
  const root = document.getElementById('root');
  const slide = document.createElement('div');
  slide.className = 'slide ' + data.layout;

  if (data.layout === 'capa') {
    slide.innerHTML = '<div class="title">' + data.body + '</div><div class="accent">FreeMe</div>';
  } else if (data.layout === 'conteudo') {
    slide.style.position = 'relative';
    slide.innerHTML = '<div class="num">' + (data.numero || '') + '</div><div class="body">' + data.body + '</div>';
  } else if (data.layout === 'citacao') {
    slide.innerHTML = '<div class="body">"' + data.body + '"</div>';
  } else if (data.layout === 'cta') {
    slide.innerHTML = '<div class="body">' + data.body + '</div><div class="btn">freeme.viviannedossantos.com</div>';
  } else if (data.layout === 'assinatura') {
    slide.innerHTML = '<svg class="spiral" viewBox="0 0 512 512"><path d="M256 256 C256 210 220 180 180 180 C130 180 100 220 100 270 C100 340 150 390 220 390 C320 390 380 320 380 220 C380 130 310 70 220 70 C120 70 50 150 50 250 C50 380 150 470 290 470 C345 470 385 455 425 425" fill="none" stroke="#C87A5B" stroke-width="13" stroke-linecap="round"/></svg><div class="name">Vivianne dos Santos</div><div class="handle">@viviannedossantos</div>';
  }

  root.appendChild(slide);
  window.READY = true;
</script>
</body>
</html>
