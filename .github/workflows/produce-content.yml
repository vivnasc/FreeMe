name: Produzir conteudo FreeMe

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Que posts processar"
        type: choice
        required: true
        default: all
        options:
          - all
          - slides-only
          - videos-only
          - semana-1
          - semana-2
          - semana-3
          - semana-4
          - day-1
          - day-7
          - day-15
          - day-30

jobs:
  render:
    # ubuntu-22.04 por causa dos pacotes -t64 no 24.04 que partem o puppeteer (SyncHim §14)
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm ci

      - name: Install Chromium + ffmpeg deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libdbus-1-3 libatk-bridge2.0-0 libdrm2 libgbm1 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libasound2 libpango-1.0-0 libcairo2 \
            ffmpeg fonts-liberation

      - name: Dump posts to JSON
        run: npm run produce:dump

      - name: Render slides (PNG)
        if: ${{ inputs.scope != 'videos-only' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          FREEME_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.FREEME_SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run produce:render -- --scope=${{ inputs.scope }} --concurrency=4

      - name: Render videos (MP4 com TTS)
        if: ${{ inputs.scope != 'slides-only' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          FREEME_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.FREEME_SUPABASE_SERVICE_ROLE_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
        run: node tools/produce/render-videos.mjs --scope=${{ inputs.scope }} --concurrency=2

      - name: Upload posts.json as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: posts-snapshot
          path: tools/produce/posts.json
          retention-days: 7
